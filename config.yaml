# Cérebro da Marina: gpt-5.5 via assinatura ChatGPT (openai-codex), $0/token.
# O Grok entra como fallback depois (hermes fallback add xai-oauth).
model:
  default: gpt-5.5
  provider: openai-codex
  base_url: ''
providers: {}
fallback_providers: []
toolsets:
  - hermes-cli

# Canal WhatsApp — a Marina atende SÓ Fernanda + Marcio. Cliente (fora do allowlist) é
# IGNORADO em silêncio. Todo texto é espelhado no painel pelo patch do bridge (PANEL_WEBHOOK_URL).
# ISOLADO do WhatsApp do profile default: sessão + porta próprias (não encosta na conexão global).
whatsapp:
  dm_policy: allowlist               # só quem está no allow_from é atendido
  allow_from:
    - "5585987495322"                # Fernanda
    - "5585987072409"                # Marcio
  group_policy: disabled             # ignora qualquer grupo
  unauthorized_dm_behavior: ignore   # cliente fora do allowlist = silêncio total
  reply_prefix: ""                   # sem header "Hermes Agent" — a Marina assina sozinha
  # sessão: fica no padrão HERMES_HOME/platforms/whatsapp/session (já isolado, pois o
  # HERMES_HOME da Marina é o profile dela). session_path custom NÃO é bridgeado pro gateway.

# Ferramentas da agência (a mesma fonte única do painel), via o MCP local.
# ${HOME} e as env vars são interpoladas pelo Hermes na hora de subir o servidor.
mcp_servers:
  fsampaio:
    command: node
    args:
      - ${HOME}/.hermes/profiles/marina/marina-mcp.mjs
    env:
      FSAMPAIO_URL: ${FSAMPAIO_URL}
      AGENT_API_SECRET: ${AGENT_API_SECRET}
    enabled: true
    timeout: 60
    connect_timeout: 20
    # SEGURANÇA (fase de teste): tira as ferramentas destrutivas do alcance da Marina.
    # Reabrir depois, com gate de aprovação humano, quando ela estiver validada.
    tools:
      exclude:
        - excluir_cliente
        - excluir_cotacao
        - excluir_reserva
        - excluir_lancamento
        - excluir_conta
